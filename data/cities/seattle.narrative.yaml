# Report narrative templates for Seattle (read by scripts/report.py on the
# report-builder branch). Extracted from data/cities/seattle.yaml so the
# catalog stays presentation-free. Child cities inherit this at report time.

narrative:

  # ----- reusable conditional clauses -----
  clauses:
    precip_drier:
      when: { d_precip_lte: -1 }
      template: " Drier than usual ({precip_str})."
    photon_days:
      when: { photon_gt: 0 }
      template: " **Photon Fraud** days ({photon}) — sun visible, vitamin D not included."
    cooler_paren:
      when: { d_hi_lte: -3 }
      template: " Cooler than normal ({d_hi_str} on highs)."
    d_hi_paren:
      when: { has_d_hi: true }
      template: " ({d_hi_str} vs normal)"
    d_hi_inline:
      when: { has_d_hi: true }
      template: ", {d_hi_str} vs normal"
    peak_snow_paren:
      when: { peak_snow_in_gt: 0 }
      template: " Peak accumulation **{peak_snow_in_str}** on {peak_snow_date}."
    peak_snow_short:
      when: { peak_snow_in_gt: 0 }
      template: " Peak **{peak_snow_in_str}** on {peak_snow_date}."
    peak_hi_jun:
      when: { peak_hi_f_gte: 78 }
      template: " A **{peak_hi_str}** spike on {peak_hi_date} teased **Summer** early."
    peak_hi_summer:
      when: { peak_hi_f_gte: 80 }
      template: " Peak **{peak_hi_str}** on {peak_hi_date}."
    actual_spring_dry:
      when: { d_precip_lte: -0.5 }
      template: " Dry enough to believe it."
    drizzle_break:
      when: { drizzle_gt: 0 }
      template: " interrupted by **Welcome Drizzle** ({drizzle} day(s)) — rain washing summer out of the air"
    wet_september:
      when: { d_precip_gte: 2 }
      template: ", and wet ({precip_str}, {d_precip_str} vs norm)"
    welcome_drizzle_count:
      when: { drizzle_gt: 0 }
      template: " **Welcome Drizzle** on {drizzle} day(s)."
    soaking_close:
      when: { d_precip_gte: 1.5 }
      template: ", soaking close ({precip_str})"
    find_bananas_dec:
      when: { bananas_gt: 0 }
      template: "; **Find Bananas** on {bananas} day(s) — trace snow, full panic"
    feb_peak:
      when: { feb_peak_snow_in_gt: 0 }
      template: " (**{feb_peak_snow_in_str}** on {feb_peak_snow_date})"

  # ----- opening paragraphs of the YTD Summary section -----
  ytd_lead:
    mode: branches
    fragments:
      - when: { feb_snow_label_eq: snowmageddon }
        template: |
          If you lived through this period, you remember February's **snowmageddon** — **Find Bananas** on {bananas_total} day(s), **Paralyzing Snow** on {paralyzing_total}{clause_feb_peak}. The rest of the year was comparatively gentle, but February did the talking.
      - when: { feb_snow_label_in: [snow_siege, banana_weather] }
        template: |
          **February** was **The Long Dark** in force — cold ({feb_d_hi_label}), **Find Bananas** on {bananas_total} day(s) over trace snow{clause_feb_peak}. Not a full **snowmageddon**, but **Paralyzing Snow** fired {paralyzing_total} day(s) and the city acted like it was the end times.
      - when: { freeze_days_total_lte: 6 }
        template: |
          This was a **mild winter** year — **The Long Dark** without many hard freezes, **Fool's Spring** teases that almost convinced you, and no real **Paralyzing Snow**.
      - template: |
          A mixed **Winter** year — {freeze_days_total} sub-freezing nights, **The Dark Wet** doing its job.

  ytd_spring_arc:
    mode: branches
    fragments:
      - when: { has_spring_arc: false }
        template: ""
      - when: { mar_d_precip_lte: -1, feb_was_snowmageddon: true }
        template: |
          The spring **lies** ran in order: {spring_arc_str}. March's **Spring of Deception** hit especially hard — warmth after **snowmageddon**, dry enough to feel like absolution.
      - when: { mar_d_precip_lte: -1, feb_snow_days_gte: 1 }
        template: |
          The spring **lies** ran in order: {spring_arc_str}. March's **Spring of Deception** offered warmth after a punishing **Winter** — dry enough to feel like absolution.
      - when: { spring_arc_len_gte: 3 }
        template: |
          Seattle's recursive spring played out: {spring_arc_str} — each fake-out more convincing than the last until **Actual Spring** stuck.

  ytd_summer:
    mode: branches
    fragments:
      - when: { summer_cool_count_gte: 2 }
        template: |
          **Summer** arrived but kept its handbrake on — cooler than normal June through August, no **Hell's Front Porch**, {days_70} days still kissed 70°F+. **Welcome Drizzle** eventually ended the dry spell.
      - when: { days_80_gte: 8 }
        template: |
          **Summer** brought the heat — {days_80} days at 80°F+, **Oppressive Sun** territory even if the classifier didn't always tag it.

  # ----- one paragraph per month for the "Monthly story" section -----
  months:
    "1":
      mode: concat
      fragments:
        - template: "**{month_name}** opened under **{primary_calendar}** and **The Long Dark** — grey, mid-40s, nothing telegraphing what was coming."
        - ref: precip_drier
        - ref: photon_days
    "2":
      mode: branches
      fragments:
        - when: { snow_label_eq: snowmageddon }
          template: |
            **{month_name}** was the year. **The Long Dark** turned into **snowmageddon**: **Find Bananas** panic on {bananas} day(s), **Paralyzing Snow** on {paralyzing} — buses jackknifing, QFC stripped of bread, milk, and bananas.{clause_peak_snow_paren} Highs averaged {avg_hi_str}{clause_d_hi_paren}. This was **Winter**, not **Fool's Spring** — any tomato-start optimism died in the snowpack.
        - when: { has_snow_label: true }
          template: "**{month_name}** — **{snow_label_human}** inside **Winter**: **Find Bananas** ({bananas}d), **Paralyzing Snow** ({paralyzing}d).{clause_peak_snow_short}"
        - template: "**{month_name}** — **Fool's Spring** teased through **Brightening Wet** ({avg_hi_str} avg high); no **Paralyzing Snow** to speak of."
    "3":
      mode: concat
      fragments:
        - template: "**{month_name}** — **{primary_series_or_deception}**"
        - when: { snow_days_gt: 0 }
          template: " with **Second Winter** echoes ({snow_days} trace-snow day(s))"
        - when: { d_precip_lte: -1.5 }
          template: ", dry and bright ({precip_str})"
        - when: { peak_hi_f_gte: 65 }
          template: ", then the **false spring**: **{peak_hi_str}** on {peak_hi_date} — three weeks after the snow siege, forgiven for planting something you shouldn't have"
        - template: "."
    "4":
      mode: concat
      fragments:
        - template: "**{month_name}** — **Third Winter** whiplash inside **Flowering Wet**: blossoms and cold rain, 60°F afternoons that lied."
        - ref: cooler_paren
    "5":
      mode: concat
      fragments:
        - template: "**{month_name}** — **Actual Spring** finally showed up: reliable sun-breaks, {avg_hi_str} highs, the year exhaled."
        - ref: actual_spring_dry
    "6":
      mode: branches
      fragments:
        - when: { is_juneuary: true }
          template: "**{month_name}** — **Juneuary** marine layer — cool, cloudy, drizzle-adjacent ({avg_hi_str} avg high{clause_d_hi_inline}).{clause_peak_hi_jun}"
        - template: "**{month_name}** — **Actual Spring** bleeding into summer ({avg_hi_str} avg high).{clause_peak_hi_jun}"
    "7":
      mode: concat
      fragments:
        - template: "**{month_name}** — {summer_label}: "
        - when: { d_hi_lte: -3 }
          template: "cooler than the brochure ({avg_hi_str} avg, {d_hi_str} vs normal) but still {days_60}+ days at 60°F+."
        - when: { d_hi_gt: -3 }
          template: "dry, warm, {avg_hi_str} highs — the reason anyone tolerates the other ten months."
        - ref: peak_hi_summer
    "8":
      mode: concat
      fragments:
        - template: "**{month_name}** — {summer_label}: "
        - when: { d_hi_lte: -3 }
          template: "cooler than the brochure ({avg_hi_str} avg, {d_hi_str} vs normal) but still {days_60}+ days at 60°F+."
        - when: { d_hi_gt: -3 }
          template: "dry, warm, {avg_hi_str} highs — the reason anyone tolerates the other ten months."
        - ref: peak_hi_summer
    "9":
      mode: concat
      fragments:
        - template: "**{month_name}** — **Second Summer** golden light"
        - ref: drizzle_break
        - ref: wet_september
        - template: "."
    "10":
      mode: concat
      fragments:
        - template: "**{month_name}** — **Actual Fall** → **The Grey**: sweater weather, leaves, the lid coming down ({avg_hi_str} avg high)."
        - ref: welcome_drizzle_count
    "11":
      mode: concat
      fragments:
        - template: "**{month_name}** — **Actual Fall** → **The Grey**: sweater weather, leaves, the lid coming down ({avg_hi_str} avg high)."
        - ref: welcome_drizzle_count
    "12":
      mode: concat
      fragments:
        - template: "**{month_name}** — back into **Winter** and **The Dark Wet**"
        - ref: soaking_close
        - ref: find_bananas_dec
        - template: "."

  # ----- biweekly chunk titles (Season timeline section) -----
  chunk_titles:
    mode: branches
    fragments:
      - when: { chunk_peak_snow_in_gte: 4 }
        template: "**The Snow Siege** · {chunk_dominant_tag}"
      - when: { has_paralyzing_snow_chunk: true }
        template: "**The Snow Siege** · {chunk_dominant_tag}"
      - when: { chunk_peak_snow_in_gte: 1.5 }
        template: "**Banana Weather** · {chunk_dominant_tag}"
      - when: { has_find_bananas_chunk: true }
        template: "**Banana Weather** · {chunk_dominant_tag}"
      - when: { chunk_dominant_eq: "Fool's Spring" }
        template: "**Fool's Spring** (the first lie)"
      - when: { chunk_dominant_eq: "Spring of Deception" }
        template: "**Spring of Deception**"
      - when: { chunk_dominant_eq: "Third Winter" }
        template: "**Third Winter** (the insult)"
      - when: { chunk_dominant_eq: "Actual Spring" }
        template: "**Actual Spring** (the real one)"
      - template: "{chunk_dominant_tag}"

  # ----- biweekly chunk commentary (Season timeline section) -----
  chunks:
    mode: branches
    fragments:
      - when: { chunk_peak_snow_in_gte: 1.5 }
        template: |
          You remember this week. **{chunk_snow_label_human}** — **Find Bananas** emptied the produce aisle, **Paralyzing Snow** stranded the hill neighborhoods. Peak **{chunk_peak_snow_in_str}** on {chunk_peak_snow_date}; highs stuck near {chunk_peak_snow_temp_str}. Capitol Hill became a parking lot.
      - when: { has_paralyzing_snow_chunk: true }
        template: |
          You remember this week. **{chunk_snow_label_human}** — **Find Bananas** emptied the produce aisle, **Paralyzing Snow** stranded the hill neighborhoods. Peak **{chunk_peak_snow_in_str}** on {chunk_peak_snow_date}; highs stuck near {chunk_peak_snow_temp_str}. Capitol Hill became a parking lot.
      - when: { chunk_peak_snow_in_gte: 0.1, chunk_snow_days_gte: 1, chunk_avg_hi_lt: 50 }
        template: |
          **Second Winter** echo — trace snow ({chunk_peak_snow_in_str} on {chunk_peak_snow_date}). Not **snowmageddon**, just enough to keep you honest.
      - when: { has_welcome_drizzle_chunk: true }
        template: |
          **Welcome Drizzle** — the first real rain after summer's dry spell. Petrichor, smoke clearing, everyone pretending they missed it.
      - when: { chunk_dominant_eq: "Fool's Spring", chunk_avg_hi_gte: 50 }
        template: "**Fool's Spring** — shorts on Capitol Hill, tomato starts purchased, Second Winter loading in the background."
      - when: { chunk_dominant_eq: "Spring of Deception", chunk_avg_hi_gte: 55 }
        template: "**Spring of Deception** — warm enough to uncover patio furniture, cold enough to regret it. Blossoms + betrayal."
      - when: { chunk_dominant_eq: "Third Winter" }
        template: "**Third Winter** — the final insult after the spring fake-outs. Flowering trees, hail, maybe snow. Classic Seattle whiplash."
      - when: { chunk_dominant_eq: "Actual Spring", chunk_avg_hi_gte: 62 }
        template: "**Actual Spring** — brief, real, jacket-optional evenings. It stuck."
      - when: { chunk_precip_gte: 3 }
        template: "**Molding Wet** / **Convergence Zones** energy — relentless soak, five miles south it's dry."
      - when: { chunk_dominant_eq: "Winter", chunk_avg_hi_lt: 45 }
        template: "**The Long Dark** — sunset at 4:20, airborne dampness, low-grade despair."
      - when: { chunk_dominant_eq: "Summer", chunk_avg_hi_gte: 70 }
        template: "**Summer** — 75°F, no humidity, the ten months of grey earn their keep."
      - when: { chunk_dominant_eq: "Second Summer" }
        template: "**Second Summer** — arguably the best weather of the year."
      - when: { chunk_dominant_eq: "Actual Fall" }
        template: "**Actual Fall** — crisp, leaves, **The Grey** loading."

  # Per-month summer label override (Smogust / Hell's Front Porch substrings
  # are computed in code based on triggered events; the static fallback is "Summer").
  summer_labels:
    smoke: "**Summer** / **Smoketember** smoke"
    heat:  "**Summer** pushing **Hell's Front Porch**"
    plain: "**Summer**"
