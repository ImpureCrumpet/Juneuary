  # ----- biweekly chunk titles (Season timeline section) -----
  chunk_titles:
    mode: branches
    fragments:
      - when: { chunk_peak_snow_in_gte: 4 }
        template: "**The Snow Siege** · {chunk_dominant_tag}"
      - when: { has_paralyzing_snow_chunk: true }
        template: "**The Snow Siege** · {chunk_dominant_tag}"
      - when: { chunk_peak_snow_in_gte: 1.5 }
        template: "**Banana Weather** · {chunk_dominant_tag}"
      - when: { has_find_bananas_chunk: true }
        template: "**Banana Weather** · {chunk_dominant_tag}"
      - when: { chunk_dominant_eq: "Fool's Spring" }
        template: "**Fool's Spring** (the first lie)"
      - when: { chunk_dominant_eq: "Spring of Deception" }
        template: "**Spring of Deception**"
      - when: { chunk_dominant_eq: "Third Winter" }
        template: "**Third Winter** (the insult)"
      - when: { chunk_dominant_eq: "Actual Spring" }
        template: "**Actual Spring** (the real one)"
      - template: "{chunk_dominant_tag}"

  # ----- biweekly chunk commentary (Season timeline section) -----
  chunks:
    mode: branches
    fragments:
      - when: { chunk_peak_snow_in_gte: 1.5 }
        template: |
          You remember this week. **{chunk_snow_label_human}** — **Find Bananas** emptied the produce aisle, **Paralyzing Snow** stranded the hill neighborhoods. Peak **{chunk_peak_snow_in_str}** on {chunk_peak_snow_date}; highs stuck near {chunk_peak_snow_temp_str}. Capitol Hill became a parking lot.
      - when: { has_paralyzing_snow_chunk: true }
        template: |
          You remember this week. **{chunk_snow_label_human}** — **Find Bananas** emptied the produce aisle, **Paralyzing Snow** stranded the hill neighborhoods. Peak **{chunk_peak_snow_in_str}** on {chunk_peak_snow_date}; highs stuck near {chunk_peak_snow_temp_str}. Capitol Hill became a parking lot.
      - when: { chunk_peak_snow_in_gte: 0.1, chunk_snow_days_gte: 1, chunk_avg_hi_lt: 50 }
        template: |
          **Second Winter** echo — trace snow ({chunk_peak_snow_in_str} on {chunk_peak_snow_date}). Not **snowmageddon**, just enough to keep you honest.
      - when: { has_welcome_drizzle_chunk: true }
        template: |
          **Welcome Drizzle** — the first real rain after summer's dry spell. Petrichor, smoke clearing, everyone pretending they missed it.
      - when: { chunk_dominant_eq: "Fool's Spring", chunk_avg_hi_gte: 50 }
        template: "**Fool's Spring** — shorts on Capitol Hill, tomato starts purchased, Second Winter loading in the background."
      - when: { chunk_dominant_eq: "Spring of Deception", chunk_avg_hi_gte: 55 }
        template: "**Spring of Deception** — warm enough to uncover patio furniture, cold enough to regret it. Blossoms + betrayal."
      - when: { chunk_dominant_eq: "Third Winter" }
        template: "**Third Winter** — the final insult after the spring fake-outs. Flowering trees, hail, maybe snow. Classic Seattle whiplash."
      - when: { chunk_dominant_eq: "Actual Spring", chunk_avg_hi_gte: 62 }
        template: "**Actual Spring** — brief, real, jacket-optional evenings. It stuck."
      - when: { chunk_precip_gte: 3 }
        template: "**Molding Wet** / **Convergence Zones** energy — relentless soak, five miles south it's dry."
      - when: { chunk_dominant_eq: "Winter", chunk_avg_hi_lt: 45 }
        template: "**The Long Dark** — sunset at 4:20, airborne dampness, low-grade despair."
      - when: { chunk_dominant_eq: "Summer", chunk_avg_hi_gte: 70 }
        template: "**Summer** — 75°F, no humidity, the ten months of grey earn their keep."
      - when: { chunk_dominant_eq: "Second Summer" }
        template: "**Second Summer** — arguably the best weather of the year."
      - when: { chunk_dominant_eq: "Actual Fall" }
        template: "**Actual Fall** — crisp, leaves, **The Grey** loading."

  # Per-month summer label override (Smogust / Hell's Front Porch substrings
  # are computed in code based on triggered events; the static fallback is "Summer").
  summer_labels:
    smoke: "**Summer** / **Smoketember** smoke"
    heat:  "**Summer** pushing **Hell's Front Porch**"
    plain: "**Summer**"
